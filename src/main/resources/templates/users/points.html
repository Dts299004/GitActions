<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<head>
</head>
<body>
    <div th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div th:if="${success}" class="alert alert-success mt-4">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger mt-4">
                    <i class="fas fa-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
                </div>

                <div class="card shadow-sm border-0 rounded-4 mt-4 mb-5">
                    <div class="card-header bg-warning rounded-top-4 py-3">
                        <h4 class="mb-0 fw-bold text-dark"><i class="fas fa-coins me-2 text-danger"></i>Đổi điểm tích lũy thành Voucher</h4>
                    </div>
                    <div class="card-body p-4 text-center">
                        <h1 class="display-4 fw-bold text-danger mb-0" th:text="${user.points}">0</h1>
                        <p class="text-muted fw-bold mb-4">Điểm Tích Lũy Hiện Tại</p>

                        <hr class="mb-4">

                        <h5 class="fw-bold mb-3">Chọn mã giảm giá muốn đổi</h5>
                        <div class="row row-cols-1 row-cols-md-2 g-3 text-start">
                            
                            <!-- Voucher 1 -->
                            <div class="col">
                                <form th:action="@{/points/exchange}" method="post">
                                    <input type="hidden" name="amount" value="500">
                                    <div class="card h-100 border border-warning rounded-3 bg-light">
                                        <div class="card-body p-3">
                                            <div class="d-flex justify-content-between align-items-center mb-2">
                                                <h6 class="mb-0 fw-bold text-danger">Voucher 50K</h6>
                                                <span class="badge bg-warning text-dark"><i class="fas fa-coins me-1"></i>500 điểm</span>
                                            </div>
                                            <p class="small text-muted mb-3">Giảm 50.000đ trực tiếp vào đơn hàng.</p>
                                            <button type="submit" class="btn btn-sm btn-outline-danger w-100 fw-bold" 
                                                th:disabled="${user.points < 500}">Đổi ngay</button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                            <!-- Voucher 2 -->
                            <div class="col">
                                <form th:action="@{/points/exchange}" method="post">
                                    <input type="hidden" name="amount" value="1000">
                                    <div class="card h-100 border border-warning rounded-3 bg-light">
                                        <div class="card-body p-3">
                                            <div class="d-flex justify-content-between align-items-center mb-2">
                                                <h6 class="mb-0 fw-bold text-danger">Voucher 100K</h6>
                                                <span class="badge bg-warning text-dark"><i class="fas fa-coins me-1"></i>1000 điểm</span>
                                            </div>
                                            <p class="small text-muted mb-3">Giảm 100.000đ trực tiếp vào đơn hàng.</p>
                                            <button type="submit" class="btn btn-sm btn-outline-danger w-100 fw-bold"
                                                th:disabled="${user.points < 1000}">Đổi ngay</button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
