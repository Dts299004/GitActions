<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>Thêm Danh Mục</title>
</head>

<body>
    <div th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                        <h3 class="card-title fw-bold mb-0"
                            th:text="${category.id != null ? 'Sửa Danh Mục' : 'Thêm Danh Mục Mới'}"></h3>
                        <p class="text-muted small mb-0">Để trống "Danh mục cha" nếu đây là nhóm danh mục cấp 1</p>
                    </div>
                    <div class="card-body p-4">
                        <form
                            th:action="@{${category.id != null ? '/categories/update/' + category.id : '/categories/add'}}"
                            th:object="${category}" method="post">

                            <!-- Danh mục cha -->
                            <div class="mb-4">
                                <label for="parentId" class="form-label fw-semibold">
                                    Thuộc nhóm danh mục
                                    <span class="text-muted fw-normal small">(Danh mục cấp 1)</span>
                                </label>
                                <select class="form-select form-select-lg" id="parentId" name="parentId">
                                    <option value="">-- Tạo nhóm mới (không có cha) --</option>
                                    <option th:each="p : ${parentCategories}" th:value="${p.id}" th:text="${p.name}"
                                        th:selected="${category.parent != null and category.parent.id == p.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- Tên danh mục -->
                            <div class="mb-4">
                                <label for="name" class="form-label fw-semibold">Tên danh mục</label>
                                <input type="text" class="form-control form-control-lg" id="name" th:field="*{name}"
                                    placeholder="Ví dụ: Sạc dự phòng" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}"
                                    th:errors="*{name}">Lỗi tên</div>
                            </div>

                            <!-- URL ảnh (cho danh mục tầng 2) -->
                            <div class="mb-4">
                                <label for="image" class="form-label fw-semibold">
                                    URL ảnh
                                    <span class="text-muted fw-normal small">(dành cho danh mục cấp 2)</span>
                                </label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="image" th:field="*{image}"
                                        placeholder="https://example.com/image.jpg" oninput="previewImage(this.value)">
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="document.getElementById('image').value=''; previewImage('')">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                                <!-- Preview ảnh -->
                                <div class="mt-2" id="img-preview-wrap" style="display:none;">
                                    <img id="img-preview" src="" alt="preview"
                                        style="width:72px;height:72px;object-fit:cover;border-radius:50%;border:2px solid #ececec;">
                                </div>
                            </div>

                            <!-- Icon FA (cho nhóm cấp 1) -->
                            <div class="mb-4">
                                <label for="icon" class="form-label fw-semibold">
                                    Icon Font Awesome
                                    <span class="text-muted fw-normal small">(dành cho nhóm cấp 1)</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i id="icon-preview" class="fas fa-folder"></i>
                                    </span>
                                    <input type="text" class="form-control" id="icon" th:field="*{icon}"
                                        placeholder="fas fa-mobile-alt"
                                        oninput="document.getElementById('icon-preview').className = this.value || 'fas fa-folder'">
                                </div>
                                <div class="text-muted small mt-1">
                                    Ví dụ: <code>fas fa-mobile-alt</code>, <code>fas fa-laptop</code>,
                                    <code>fas fa-camera</code>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="/categories/accessories" class="btn btn-light me-md-2">Hủy bỏ</a>
                                <button type="submit" class="btn btn-warning px-5 fw-bold"
                                    style="background:#fed700;border-color:#fed700;">
                                    <i class="fas fa-save me-1"></i>Lưu danh mục
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function previewImage(url) {
                const wrap = document.getElementById('img-preview-wrap');
                const img = document.getElementById('img-preview');
                if (url && url.trim()) {
                    img.src = url.trim();
                    wrap.style.display = 'block';
                } else {
                    wrap.style.display = 'none';
                }
            }
        </script>
    </div>
</body>

</html>
