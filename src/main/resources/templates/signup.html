<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Thế Giới Di Động</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="notification"></div>

    <main class="auth-container">
        <div class="auth-card">
            <header class="auth-header">
                <div class="auth-logo">TGDĐ</div>
                <p class="auth-subtitle">Tạo tài khoản mới</p>
            </header>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required minlength="3" maxlength="20" placeholder="Từ 3-20 ký tự">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required placeholder="example@mail.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required minlength="6" placeholder="Ít nhất 6 ký tự">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <span>Đăng ký</span>
                    <div class="loader"></div>
                </button>
            </form>

            <footer class="auth-footer">
                Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
            </footer>
        </div>
    </main>

    <script th:src="@{/js/auth.js}"></script>
</body>
</html>
