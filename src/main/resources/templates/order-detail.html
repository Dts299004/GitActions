<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<head><title>Chi tiết đơn hàng</title></head>
<body>
<div th:fragment="content">
<style>
    .detail-page { background: #fff; border-radius: 10px; padding: 28px; }
    .detail-title { font-size: 20px; font-weight: 800; color: #cd1818; border-bottom: 3px solid #cd1818; padding-bottom: 10px; margin-bottom: 24px; }
    .info-box { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 10px; padding: 16px; margin-bottom: 18px; }
    .info-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px dashed #f0f0f0; }
    .info-row:last-child { border-bottom: none; }
    .cart-table th { background: #cd1818; color: #fff; font-size: 13px; font-weight: 600; }
    .cart-table td { vertical-align: middle; font-size: 13px; }
    .cart-img { width: 55px; height: 55px; object-fit: contain; border-radius: 6px; border: 1px solid #eee; }
    .badge-processing { background: #fff3cd; color: #856404; padding: 4px 12px; border-radius: 20px; font-size:12px; font-weight:600; }
    .badge-success { background: #d1e7dd; color: #0a5e3f; padding: 4px 12px; border-radius: 20px; font-size:12px; font-weight:600; }
    .badge-failed { background: #f8d7da; color: #842029; padding: 4px 12px; border-radius: 20px; font-size:12px; font-weight:600; }
    .summary-box { background: #fff9f9; border: 1px solid #f5c6c6; border-radius: 10px; padding: 18px; }
</style>

<div class="detail-page">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="detail-title mb-0"><i class="fas fa-receipt me-2"></i>Chi tiết đơn hàng #<span th:text="${order.id}"></span></h2>
        <a href="/orders" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Danh sách đơn</a>
    </div>

    <div class="row g-3 mb-4">
        <!-- Thông tin khách hàng -->
        <div class="col-md-6">
            <div class="info-box h-100">
                <div class="fw-bold mb-2 text-danger"><i class="fas fa-user me-1"></i>Thông tin khách hàng</div>
                <div class="info-row"><span class="text-muted">Họ tên:</span> <span class="fw-bold" th:text="${order.customerName}"></span></div>
                <div class="info-row"><span class="text-muted">Điện thoại:</span> <span th:text="${order.customerPhone}"></span></div>
                <div class="info-row"><span class="text-muted">Địa chỉ:</span> <span th:text="${order.customerAddress ?: 'Chưa cung cấp'}"></span></div>
            </div>
        </div>
        <!-- Thông tin đơn hàng -->
        <div class="col-md-6">
            <div class="info-box h-100">
                <div class="fw-bold mb-2 text-danger"><i class="fas fa-info-circle me-1"></i>Thông tin đơn hàng</div>
                <div class="info-row"><span class="text-muted">Mã đơn:</span> <span style="font-size:11px;font-family:monospace;" th:text="${order.orderId}"></span></div>
                <div class="info-row"><span class="text-muted">Ngày đặt:</span> <span th:text="${#temporals.format(order.createdAt, 'HH:mm dd/MM/yyyy')}"></span></div>
                <div class="info-row"><span class="text-muted">Thanh toán:</span> <span th:text="${order.paymentMethod}"></span></div>
                <div class="info-row">
                    <span class="text-muted">Trạng thái:</span>
                    <span th:classappend="${order.status == 'Đang xử lý'} ? 'badge-processing' : (${order.status == 'Thành công'} ? 'badge-success' : 'badge-failed')"
                          th:text="${order.status}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Sản phẩm -->
    <h6 class="fw-bold mb-2 text-danger"><i class="fas fa-box me-1"></i>Sản phẩm</h6>
    <div class="table-responsive mb-4">
        <table class="table cart-table align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item, iStat : ${order.items}">
                    <td th:text="${iStat.index + 1}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:src="${item.productImage != null ? item.productImage : 'https://placehold.co/55x55'}" class="cart-img" alt="img">
                            <span class="fw-bold" th:text="${item.productName}"></span>
                        </div>
                    </td>
                    <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                    <td th:text="${item.quantity}"></td>
                    <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Tổng kết -->
    <div class="row justify-content-end">
        <div class="col-md-4">
            <div class="summary-box">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Tiền hàng:</span>
                    <span class="fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Phí ship:</span>
                    <span class="fw-bold text-success"
                          th:text="${order.shippingFee == 0 ? 'Miễn phí' : #numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT') + '₫'}"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Điểm tích lũy:</span>
                    <span class="fw-bold text-primary" th:text="${order.loyaltyPoints} + 'đ'"></span>
                </div>
                <hr>
                <div class="d-flex justify-content-between">
                    <span class="fs-5 fw-bold">Tổng thanh toán:</span>
                    <span class="fs-5 fw-bold text-danger" th:text="${#numbers.formatDecimal(order.grandTotal, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
